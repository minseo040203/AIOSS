name: Deployment Frequency Tracker

on:
  workflow_run:
    workflows: ['CI/CD Pipeline', 'Deploy to Production']
    types: [completed]
  release:
    types: [published, created]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  track-deployment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: read
      pull-requests: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Track Deployment Frequency
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const metricsDir = '.github/metrics';
            const deploymentFile = path.join(metricsDir, 'deployment-frequency.json');
            
            if (!fs.existsSync(metricsDir)) {
              fs.mkdirSync(metricsDir, { recursive: true });
            }
            
            let deployments = [];
            if (fs.existsSync(deploymentFile)) {
              try {
                deployments = JSON.parse(fs.readFileSync(deploymentFile, 'utf8'));
              } catch (e) {
                console.log('Starting fresh deployment tracking');
                deployments = [];
              }
            }
            
            const timestamp = new Date().toISOString();
            
            if (context.payload.workflow_run) {
              const workflowRun = context.payload.workflow_run;
              const workflowName = workflowRun.name;
              const conclusion = workflowRun.conclusion;
              const status = workflowRun.status;
              
              console.log('Workflow Run: ' + workflowName + ', Status: ' + status);
              
              const isSuccessful = conclusion === 'success';
              
              if (status === 'completed') {
                deployments.push({
                  id: workflowRun.id,
                  workflow_name: workflowName,
                  deployed_at: timestamp,
                  status: isSuccessful ? 'success' : 'failure',
                  branch: workflowRun.head_branch,
                  actor: workflowRun.actor.login,
                  run_number: workflowRun.run_number
                });
                
                console.log('Deployment tracked: ' + (isSuccessful ? 'SUCCESS' : 'FAILURE'));
              }
            }
            
            if (context.payload.release) {
              const release = context.payload.release;
              const action = context.payload.action;
              
              console.log('Release Event: ' + action + ' - ' + release.tag_name);
              
              if (action === 'published' || action === 'created') {
                deployments.push({
                  id: release.id,
                  workflow_name: 'Release',
                  deployed_at: timestamp,
                  status: 'success',
                  branch: release.target_commitish,
                  actor: release.author.login,
                  tag: release.tag_name,
                  is_prerelease: release.prerelease
                });
                
                console.log('Release tracked: ' + release.tag_name);
              }
            }
            
            fs.writeFileSync(deploymentFile, JSON.stringify(deployments, null, 2));
            console.log('Total deployments tracked: ' + deployments.length);

      - name: Generate Deployment Report
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const deploymentFile = path.join('.github/metrics', 'deployment-frequency.json');
            
            if (!fs.existsSync(deploymentFile)) {
              console.log('No deployment data found');
              return;
            }
            
            const deployments = JSON.parse(fs.readFileSync(deploymentFile, 'utf8'));
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            const recentDeployments = deployments.filter(d => 
              new Date(d.deployed_at) >= thirtyDaysAgo
            );
            
            if (recentDeployments.length === 0) {
              console.log('No recent deployments');
              return;
            }
            
            const successCount = recentDeployments.filter(d => d.status === 'success').length;
            const failureCount = recentDeployments.filter(d => d.status === 'failure').length;
            const totalCount = recentDeployments.length;
            const successRate = totalCount > 0 ? Math.round((successCount / totalCount) * 100) : 0;
            
            const deploymentsByDay = {};
            recentDeployments.forEach(d => {
              const date = new Date(d.deployed_at).toISOString().split('T')[0];
              deploymentsByDay[date] = (deploymentsByDay[date] || 0) + 1;
            });
            
            const daysWithDeployments = Object.keys(deploymentsByDay).length;
            const avgDeploymentsPerDay = (totalCount / 30).toFixed(2);
            
            const deploymentsByWorkflow = {};
            recentDeployments.forEach(d => {
              const workflow = d.workflow_name || 'Unknown';
              deploymentsByWorkflow[workflow] = (deploymentsByWorkflow[workflow] || 0) + 1;
            });
            
            const deploymentsByActor = {};
            recentDeployments.forEach(d => {
              const actor = d.actor || 'Unknown';
              deploymentsByActor[actor] = (deploymentsByActor[actor] || 0) + 1;
            });
            
            let workflowStats = '';
            for (const name in deploymentsByWorkflow) {
              workflowStats += '- ' + name + ': ' + deploymentsByWorkflow[name] + ' times\n';
            }
            
            let actorStats = '';
            const topActors = Object.entries(deploymentsByActor)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 5);
            
            for (const [name, count] of topActors) {
              actorStats += '- ' + name + ': ' + count + ' times\n';
            }
            
            let dailyTrend = '';
            const sortedDays = Object.entries(deploymentsByDay).sort();
            for (const [date, count] of sortedDays) {
              const bars = '■'.repeat(count);
              dailyTrend += date + ': ' + bars + ' (' + count + ')\n';
            }
            
            const report = '# Deployment Frequency Report - Weekly\n\n' +
              '**Generated**: ' + new Date().toISOString() + '\n\n' +
              '**Period**: Last 30 Days\n\n' +
              '## Key Metrics\n\n' +
              '| Metric | Value |\n' +
              '|--------|-------|\n' +
              '| Total Deployments | ' + totalCount + ' |\n' +
              '| Successful | ' + successCount + ' |\n' +
              '| Failed | ' + failureCount + ' |\n' +
              '| Success Rate | ' + successRate + '% |\n' +
              '| Days with Deployments | ' + daysWithDeployments + '/30 |\n' +
              '| Avg per Day | ' + avgDeploymentsPerDay + ' |\n\n' +
              '## Deployment Frequency\n\n' +
              '- Daily: ' + daysWithDeployments + ' days with deployments\n' +
              '- Frequency: Avg ' + avgDeploymentsPerDay + ' per day\n' +
              '- Trend: ' + (totalCount > 15 ? 'High' : totalCount > 5 ? 'Medium' : 'Low') + ' frequency\n\n' +
              '## By Workflow\n\n' +
              (workflowStats || 'No data') + '\n' +
              '## Top Deployers\n\n' +
              (actorStats || 'No data') + '\n' +
              '## Daily Trend\n\n' +
              dailyTrend + '\n' +
              '## Status\n\n' +
              '- Successful: ' + successCount + ' (' + successRate + '%)\n' +
              '- Failed: ' + failureCount + ' (' + (100 - successRate) + '%)\n\n' +
              '---\n*DORA Metrics: Deployment Frequency*';
            
            const reportFile = path.join('.github/metrics', 'deployment-frequency-report.md');
            fs.writeFileSync(reportFile, report);
            
            console.log('Report generated');

      - name: Create Deployment Badge
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const deploymentFile = path.join('.github/metrics', 'deployment-frequency.json');
            
            if (!fs.existsSync(deploymentFile)) {
              return;
            }
            
            const deployments = JSON.parse(fs.readFileSync(deploymentFile, 'utf8'));
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            
            const recentCount = deployments.filter(d => 
              new Date(d.deployed_at) >= sevenDaysAgo
            ).length;
            
            const successCount = deployments.filter(d => 
              d.status === 'success' && new Date(d.deployed_at) >= sevenDaysAgo
            ).length;
            
            const badge = {
              label: 'Deployments (7d)',
              message: recentCount,
              color: recentCount > 10 ? 'green' : recentCount > 5 ? 'yellow' : 'orange'
            };
            
            const badgeFile = path.join('.github/metrics', 'deployment-badge.json');
            fs.writeFileSync(badgeFile, JSON.stringify(badge, null, 2));
            
            console.log('Badge: ' + recentCount + ' in last 7 days');

      - name: Commit deployment metrics
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -d ".github/metrics" ]; then
            git add .github/metrics/deployment-* || true
            git diff --quiet && git diff --staged --quiet || git commit -m "chore: Update deployment frequency metrics" || true
            git push origin main || true
          fi
        shell: bash
