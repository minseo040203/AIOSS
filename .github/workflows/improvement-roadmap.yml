name: Improvement Roadmap Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: write
  issues: write

jobs:
  generate-roadmap:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generate Roadmap Visualization
        run: python3 .github/scripts/generate_roadmap.py

      - name: Commit improvements
        run: |
          git config --local user.email "improvement-bot@github.com"
          git config --local user.name "Improvement Bot"
          
          if [ -f ".github/metrics/improvement-roadmap.md" ] || [ -f ".github/metrics/improvement-roadmap.json" ]; then
            git add IMPROVEMENT.md .github/metrics/improvement-*.* || true
            
            if ! git diff --quiet && ! git diff --staged --quiet; then
              git commit -m "docs: Add improvement plan and roadmap - $(date +'%Y-%m-%d')" || true
              git push origin main || true
            fi
          fi
        shell: bash
