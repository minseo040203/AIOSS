name: System Health Check & MTTR Monitoring

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-health-check]

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check System Health
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const https = require('https');
            
            const metricsDir = '.github/metrics';
            const healthFile = path.join(metricsDir, 'health-check.json');
            
            if (!fs.existsSync(metricsDir)) {
              fs.mkdirSync(metricsDir, { recursive: true });
            }
            
            let healthData = [];
            if (fs.existsSync(healthFile)) {
              try {
                healthData = JSON.parse(fs.readFileSync(healthFile, 'utf8'));
              } catch (e) {
                console.log('Starting fresh health check');
                healthData = [];
              }
            }
            
            const timestamp = new Date().toISOString();
            const checkTime = Date.now();
            
            // GitHub API 헬스 체크
            const checkGitHubAPI = new Promise((resolve) => {
              const startTime = Date.now();
              
              https.get('https://api.github.com/repos/' + context.repo.owner + '/' + context.repo.repo, 
                { headers: { 'User-Agent': 'health-check' } },
                (res) => {
                  const duration = Date.now() - startTime;
                  resolve({
                    service: 'github-api',
                    status: res.statusCode === 200 ? 'healthy' : 'unhealthy',
                    response_time_ms: duration,
                    checked_at: timestamp
                  });
                }
              ).on('error', () => {
                resolve({
                  service: 'github-api',
                  status: 'down',
                  response_time_ms: Date.now() - startTime,
                  checked_at: timestamp
                });
              });
            });
            
            const results = await Promise.all([checkGitHubAPI]);
            
            results.forEach(result => {
              healthData.push(result);
            });
            
            // 헬스 데이터 저장 (최근 1000개만 유지)
            if (healthData.length > 1000) {
              healthData = healthData.slice(-1000);
            }
            
            fs.writeFileSync(healthFile, JSON.stringify(healthData, null, 2));
            
            console.log('Health check completed');
            results.forEach(r => {
              console.log(r.service + ': ' + r.status + ' (' + r.response_time_ms + 'ms)');
            });

      - name: Analyze System Status
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const healthFile = path.join('.github/metrics', 'health-check.json');
            const statusFile = path.join('.github/metrics', 'system-status.json');
            
            if (!fs.existsSync(healthFile)) {
              console.log('No health data');
              return;
            }
            
            const healthData = JSON.parse(fs.readFileSync(healthFile, 'utf8'));
            
            if (healthData.length === 0) {
              console.log('No health records');
              return;
            }
            
            // 최근 1시간 데이터
            const oneHourAgo = new Date();
            oneHourAgo.setHours(oneHourAgo.getHours() - 1);
            
            const recentChecks = healthData.filter(d => 
              new Date(d.checked_at) >= oneHourAgo
            );
            
            if (recentChecks.length === 0) {
              console.log('No recent checks');
              return;
            }
            
            // 서비스별 상태 분석
            const serviceStatus = {};
            const serviceMetrics = {};
            
            recentChecks.forEach(check => {
              const service = check.service || 'unknown';
              
              if (!serviceStatus[service]) {
                serviceStatus[service] = { healthy: 0, unhealthy: 0, down: 0 };
                serviceMetrics[service] = { total_time: 0, min_time: Infinity, max_time: 0, count: 0 };
              }
              
              serviceStatus[service][check.status]++;
              serviceMetrics[service].total_time += check.response_time_ms || 0;
              serviceMetrics[service].min_time = Math.min(serviceMetrics[service].min_time, check.response_time_ms || 0);
              serviceMetrics[service].max_time = Math.max(serviceMetrics[service].max_time, check.response_time_ms || 0);
              serviceMetrics[service].count++;
            });
            
            // 평균 응답 시간 계산
            const serviceAvgTime = {};
            for (const service in serviceMetrics) {
              const metrics = serviceMetrics[service];
              serviceAvgTime[service] = metrics.count > 0 ? Math.round(metrics.total_time / metrics.count) : 0;
            }
            
            // 현재 상태 저장
            const currentStatus = {
              timestamp: new Date().toISOString(),
              services: serviceStatus,
              response_times: serviceAvgTime,
              total_checks: recentChecks.length,
              period: '1h'
            };
            
            fs.writeFileSync(statusFile, JSON.stringify(currentStatus, null, 2));
            
            console.log('System status analyzed');
            console.log(JSON.stringify(currentStatus, null, 2));

      - name: Detect Incidents
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const statusFile = path.join('.github/metrics', 'system-status.json');
            const incidentFile = path.join('.github/metrics', 'incidents.json');
            
            if (!fs.existsSync(statusFile)) {
              return;
            }
            
            const currentStatus = JSON.parse(fs.readFileSync(statusFile, 'utf8'));
            
            let incidents = [];
            if (fs.existsSync(incidentFile)) {
              try {
                incidents = JSON.parse(fs.readFileSync(incidentFile, 'utf8'));
              } catch (e) {
                incidents = [];
              }
            }
            
            // 장애 감지
            const detectedIncidents = [];
            
            for (const service in currentStatus.services) {
              const status = currentStatus.services[service];
              const unhealthyCount = status.unhealthy + status.down;
              const totalCount = status.healthy + unhealthyCount;
              const failureRate = totalCount > 0 ? (unhealthyCount / totalCount) * 100 : 0;
              
              if (failureRate > 50) {
                detectedIncidents.push({
                  service: service,
                  status: 'ongoing',
                  detected_at: currentStatus.timestamp,
                  failure_rate: failureRate.toFixed(2),
                  checks: { healthy: status.healthy, unhealthy: unhealthyCount }
                });
              }
            }
            
            // 신규 장애 추가
            const existingServices = new Set(incidents.map(i => i.service));
            
            detectedIncidents.forEach(incident => {
              const existingIncident = incidents.find(i => i.service === incident.service && i.status === 'ongoing');
              
              if (!existingIncident) {
                incident.id = Date.now();
                incidents.push(incident);
              }
            });
            
            // 복구된 서비스 마크
            incidents.forEach(incident => {
              if (incident.status === 'ongoing') {
                const currentServiceStatus = currentStatus.services[incident.service];
                if (currentServiceStatus && currentServiceStatus.unhealthy === 0 && currentServiceStatus.down === 0) {
                  incident.status = 'recovered';
                  incident.recovered_at = currentStatus.timestamp;
                  
                  if (incident.detected_at) {
                    const detectedTime = new Date(incident.detected_at).getTime();
                    const recoveredTime = new Date(incident.recovered_at).getTime();
                    incident.recovery_time_minutes = Math.round((recoveredTime - detectedTime) / (1000 * 60));
                  }
                }
              }
            });
            
            fs.writeFileSync(incidentFile, JSON.stringify(incidents, null, 2));
            
            if (detectedIncidents.length > 0) {
              console.log('Incidents detected: ' + detectedIncidents.length);
            }

      - name: Calculate MTTR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const incidentFile = path.join('.github/metrics', 'incidents.json');
            const mttrFile = path.join('.github/metrics', 'mttr-analysis.json');
            
            if (!fs.existsSync(incidentFile)) {
              return;
            }
            
            const incidents = JSON.parse(fs.readFileSync(incidentFile, 'utf8'));
            const recoveredIncidents = incidents.filter(i => i.status === 'recovered' && i.recovery_time_minutes);
            
            if (recoveredIncidents.length === 0) {
              console.log('No recovered incidents yet');
              return;
            }
            
            const recoveryTimes = recoveredIncidents.map(i => i.recovery_time_minutes);
            const mttr = Math.round(recoveryTimes.reduce((a, b) => a + b, 0) / recoveryTimes.length);
            const mttf = 0; // Mean Time To Failure (별도 계산)
            const minRecovery = Math.min(...recoveryTimes);
            const maxRecovery = Math.max(...recoveryTimes);
            
            // 30일 기준
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            const recentRecoveredIncidents = recoveredIncidents.filter(i =>
              new Date(i.recovered_at) >= thirtyDaysAgo
            );
            
            const mttrAnalysis = {
              timestamp: new Date().toISOString(),
              mttr_minutes: mttr,
              mttr_hours: (mttr / 60).toFixed(2),
              min_recovery: minRecovery,
              max_recovery: maxRecovery,
              total_incidents: incidents.length,
              recovered_incidents: recoveredIncidents.length,
              recovery_rate: ((recoveredIncidents.length / incidents.length) * 100).toFixed(2),
              last_30_days: {
                incidents: recentRecoveredIncidents.length,
                avg_recovery_time: recentRecoveredIncidents.length > 0 
                  ? Math.round(recentRecoveredIncidents.reduce((a, b) => a + (b.recovery_time_minutes || 0), 0) / recentRecoveredIncidents.length)
                  : 0
              }
            };
            
            fs.writeFileSync(mttrFile, JSON.stringify(mttrAnalysis, null, 2));
            
            console.log('MTTR Analysis: ' + mttr + ' minutes');
            console.log('Recovered incidents: ' + recoveredIncidents.length + ' / ' + incidents.length);

      - name: Generate Health Report
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const statusFile = path.join('.github/metrics', 'system-status.json');
            const incidentFile = path.join('.github/metrics', 'incidents.json');
            const mttrFile = path.join('.github/metrics', 'mttr-analysis.json');
            const reportFile = path.join('.github/metrics', 'health-report.md');
            
            let report = '# System Health Report\n\n';
            report += '**Generated**: ' + new Date().toISOString() + '\n\n';
            
            if (fs.existsSync(statusFile)) {
              const status = JSON.parse(fs.readFileSync(statusFile, 'utf8'));
              report += '## Current Status\n\n';
              report += '| Service | Healthy | Unhealthy | Down |\n';
              report += '|---------|---------|-----------|------|\n';
              
              for (const service in status.services) {
                const s = status.services[service];
                report += '| ' + service + ' | ' + s.healthy + ' | ' + s.unhealthy + ' | ' + s.down + ' |\n';
              }
              
              report += '\n## Response Times (ms)\n\n';
              report += '| Service | Avg Time |\n';
              report += '|---------|----------|\n';
              
              for (const service in status.response_times) {
                report += '| ' + service + ' | ' + status.response_times[service] + ' |\n';
              }
              
              report += '\n';
            }
            
            if (fs.existsSync(incidentFile)) {
              const incidents = JSON.parse(fs.readFileSync(incidentFile, 'utf8'));
              const ongoingIncidents = incidents.filter(i => i.status === 'ongoing');
              const recoveredIncidents = incidents.filter(i => i.status === 'recovered');
              
              report += '## Incidents\n\n';
              report += '- Total: ' + incidents.length + '\n';
              report += '- Ongoing: ' + ongoingIncidents.length + '\n';
              report += '- Recovered: ' + recoveredIncidents.length + '\n\n';
              
              if (ongoingIncidents.length > 0) {
                report += '### Ongoing Incidents\n\n';
                ongoingIncidents.forEach(i => {
                  report += '- **' + i.service + '**: ' + i.failure_rate + '% failure rate\n';
                  report += '  - Detected: ' + i.detected_at + '\n';
                });
                report += '\n';
              }
            }
            
            if (fs.existsSync(mttrFile)) {
              const mttr = JSON.parse(fs.readFileSync(mttrFile, 'utf8'));
              report += '## MTTR Analysis\n\n';
              report += '- **Mean Time To Recovery**: ' + mttr.mttr_minutes + ' minutes (' + mttr.mttr_hours + ' hours)\n';
              report += '- **Min Recovery Time**: ' + mttr.min_recovery + ' minutes\n';
              report += '- **Max Recovery Time**: ' + mttr.max_recovery + ' minutes\n';
              report += '- **Recovery Rate**: ' + mttr.recovery_rate + '%\n';
              report += '- **Last 30 Days**: ' + mttr.last_30_days.incidents + ' incidents\n';
              report += '\n';
            }
            
            report += '---\n*DORA Metrics: Mean Time To Recovery (MTTR)*\n';
            report += '*This metric represents the average time to recover from system failures.*\n';
            
            fs.writeFileSync(reportFile, report);
            
            console.log('Health report generated');

      - name: Alert on Failures
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const incidentFile = path.join('.github/metrics', 'incidents.json');
            
            if (!fs.existsSync(incidentFile)) {
              return;
            }
            
            const incidents = JSON.parse(fs.readFileSync(incidentFile, 'utf8'));
            const ongoingIncidents = incidents.filter(i => i.status === 'ongoing');
            
            if (ongoingIncidents.length > 0) {
              let alertBody = '## System Alert: Health Check Failed\n\n';
              alertBody += '**Timestamp**: ' + new Date().toISOString() + '\n\n';
              alertBody += '### Ongoing Incidents\n\n';
              
              ongoingIncidents.slice(0, 5).forEach(i => {
                alertBody += '- **' + i.service + '**: ' + i.failure_rate + '% failure rate\n';
                alertBody += '  - Detected: ' + i.detected_at + '\n';
              });
              
              alertBody += '\n### Action Required\n';
              alertBody += '- Check service status immediately\n';
              alertBody += '- Review logs in `.github/metrics/`\n';
              alertBody += '- Contact on-call engineer\n';
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[Alert] System Health Check Failed',
                body: alertBody,
                labels: ['alert', 'health-check']
              });
              
              console.log('Alert issue created');
            }

      - name: Commit metrics
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -d ".github/metrics" ]; then
            git add .github/metrics/health-* || true
            git add .github/metrics/system-status.json || true
            git add .github/metrics/incidents.json || true
            git add .github/metrics/mttr-analysis.json || true
            git diff --quiet && git diff --staged --quiet || git commit -m "chore: Update system health metrics" || true
            git push origin main || true
          fi
        shell: bash
