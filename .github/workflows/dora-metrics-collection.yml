name: DORA Metrics Collection & Automation

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, closed]
  issues:
    types: [opened, closed]
  workflow_run:
    workflows: ['*']
    types: [completed]
  schedule:
    - cron: '0 * * * *'
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read
  checks: read

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Collect Lead Time Metrics
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            console.log('📊 Collecting Lead Time Metrics...');
            
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              
              // 최근 30일의 Issues 조회
              const issues = await github.rest.issues.listForRepo({
                owner: owner,
                repo: repo,
                state: 'all',
                sort: 'created',
                per_page: 100
              });
              
              console.log(`Found ${issues.data.length} issues`);
              
              // 최근 30일의 PRs 조회
              const prs = await github.rest.pulls.list({
                owner: owner,
                repo: repo,
                state: 'all',
                sort: 'created',
                per_page: 100
              });
              
              console.log(`Found ${prs.data.length} pull requests`);
              
              core.setOutput('lead_time_collected', 'true');
            } catch (error) {
              console.error('Error collecting lead time metrics:', error);
              core.setOutput('lead_time_collected', 'false');
            }

      - name: Collect Deployment Frequency Metrics
        uses: actions/github-script@v7
        with:
          script: |
            console.log('📈 Collecting Deployment Frequency Metrics...');
            
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              
              // 최근 워크플로우 실행 조회
              const workflows = await github.rest.actions.listWorkflowRuns({
                owner: owner,
                repo: repo,
                per_page: 100
              });
              
              console.log(`Found ${workflows.data.workflow_runs.length} workflow runs`);
              
              // Releases 조회
              const releases = await github.rest.repos.listReleases({
                owner: owner,
                repo: repo,
                per_page: 100
              });
              
              console.log(`Found ${releases.data.length} releases`);
              
              core.setOutput('deployment_freq_collected', 'true');
            } catch (error) {
              console.error('Error collecting deployment frequency metrics:', error);
              core.setOutput('deployment_freq_collected', 'false');
            }

      - name: Collect MTTR Metrics
        uses: actions/github-script@v7
        with:
          script: |
            console.log('🏥 Collecting MTTR Metrics...');
            
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              
              // 최근 Issues (버그) 조회
              const bugs = await github.rest.issues.listForRepo({
                owner: owner,
                repo: repo,
                labels: 'bug',
                state: 'all',
                per_page: 50
              });
              
              console.log(`Found ${bugs.data.length} bug issues`);
              
              // 해결 시간 분석
              let resolutionTimes = [];
              bugs.data.forEach(issue => {
                if (issue.closed_at) {
                  const created = new Date(issue.created_at).getTime();
                  const closed = new Date(issue.closed_at).getTime();
                  const minutes = (closed - created) / (1000 * 60);
                  resolutionTimes.push(minutes);
                }
              });
              
              if (resolutionTimes.length > 0) {
                const avgMTTR = resolutionTimes.reduce((a, b) => a + b, 0) / resolutionTimes.length;
                console.log(`Average MTTR: ${(avgMTTR / 60).toFixed(2)} hours`);
              }
              
              core.setOutput('mttr_collected', 'true');
            } catch (error) {
              console.error('Error collecting MTTR metrics:', error);
              core.setOutput('mttr_collected', 'false');
            }

      - name: Collect Change Failure Rate Metrics
        uses: actions/github-script@v7
        with:
          script: |
            console.log('⚠️ Collecting Change Failure Rate Metrics...');
            
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              
              // 최근 PRs 조회
              const prs = await github.rest.pulls.list({
                owner: owner,
                repo: repo,
                state: 'closed',
                per_page: 100
              });
              
              const merged = prs.data.filter(pr => pr.merged_at);
              console.log(`Found ${merged.length} merged PRs`);
              
              // 관련 버그 이슈 조회
              const bugs = await github.rest.issues.listForRepo({
                owner: owner,
                repo: repo,
                labels: 'bug',
                state: 'open',
                per_page: 50
              });
              
              if (merged.length > 0) {
                const failureRate = (bugs.data.length / merged.length) * 100;
                console.log(`Failure Rate: ${failureRate.toFixed(2)}%`);
              }
              
              core.setOutput('cfr_collected', 'true');
            } catch (error) {
              console.error('Error collecting CFR metrics:', error);
              core.setOutput('cfr_collected', 'false');
            }

      - name: Save Metrics Summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const metricsDir = '.github/metrics';
            if (!fs.existsSync(metricsDir)) {
              fs.mkdirSync(metricsDir, { recursive: true });
            }
            
            const summary = {
              timestamp: new Date().toISOString(),
              collection_status: {
                lead_time: '${{ steps.collect-lead-time.outputs.lead_time_collected }}' === 'true',
                deployment_frequency: '${{ steps.collect-deployment-frequency.outputs.deployment_freq_collected }}' === 'true',
                mttr: '${{ steps.collect-mttr.outputs.mttr_collected }}' === 'true',
                cfr: '${{ steps.collect-cfr.outputs.cfr_collected }}' === 'true'
              },
              repository: context.repo.owner + '/' + context.repo.repo,
              workflow_run_id: context.runId
            };
            
            fs.writeFileSync(
              path.join(metricsDir, 'collection-summary.json'),
              JSON.stringify(summary, null, 2)
            );
            
            console.log('✓ Metrics collection summary saved');

      - name: Generate Summary Report
        if: github.event_name == 'schedule' && github.event.schedule == '0 10 * * 1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let report = '# DORA Metrics Weekly Report\n\n';
            report += `**Week of**: ${new Date().toISOString().split('T')[0]}\n`;
            report += `**Repository**: ${{ github.repository }}\n\n`;
            
            // 메트릭 파일 읽기
            const metricsDir = '.github/metrics';
            const files = [
              'cycle-time-metrics.json',
              'cycle-time-goals.json'
            ];
            
            let hasMetrics = false;
            
            for (const file of files) {
              const filepath = path.join(metricsDir, file);
              if (fs.existsSync(filepath)) {
                try {
                  const data = JSON.parse(fs.readFileSync(filepath, 'utf8'));
                  report += `\n## 📊 ${file.replace(/\.json$/, '').replace(/-/g, ' ').toUpperCase()}\n\n`;
                  report += '```json\n' + JSON.stringify(data, null, 2).substring(0, 500) + '\n```\n';
                  hasMetrics = true;
                } catch (e) {
                  console.log(`Could not read ${file}`);
                }
              }
            }
            
            if (!hasMetrics) {
              report += '\n⚠️ No metrics data found. Run calculate_metrics.py to generate data.\n';
            }
            
            report += '\n---\n*Generated by DORA Metrics Collection Workflow*\n';
            
            const reportPath = path.join(metricsDir, 'weekly-metrics-report.md');
            fs.writeFileSync(reportPath, report);
            
            console.log('✓ Weekly report generated');

      - name: Upload metrics as artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: dora-metrics
          path: .github/metrics/
          retention-days: 30

      - name: Commit metrics to repository
        if: always()
        run: |
          git config --local user.email "dora-metrics@github.com"
          git config --local user.name "DORA Metrics Bot"
          
          if [ -d ".github/metrics" ]; then
            git add .github/metrics/ || true
            git diff --quiet && git diff --staged --quiet || (
              git commit -m "chore: Update DORA metrics - $(date +'%Y-%m-%d %H:%M:%S')" || true
            )
            git push origin main || true
          fi
        shell: bash

  analyze-and-report:
    needs: collect-metrics
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Cycle Time Analysis
        run: |
          if [ -f "calculate_metrics.py" ]; then
            python calculate_metrics.py
            echo "✓ Cycle Time Analysis Complete"
          fi
        shell: bash

      - name: Create metrics issue
        if: github.event.schedule == '0 10 * * 1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let body = '## 📊 Weekly DORA Metrics Report\n\n';
            body += `**Report Date**: ${new Date().toISOString().split('T')[0]}\n\n`;
            
            const metricsDir = '.github/metrics';
            
            // lead-time 리포트
            const ltReport = path.join(metricsDir, 'lead-time-report.md');
            if (fs.existsSync(ltReport)) {
              const content = fs.readFileSync(ltReport, 'utf8');
              body += '### Lead Time\n' + content.substring(0, 500) + '\n\n';
            }
            
            // cycle-time 리포트
            const ctReport = path.join(metricsDir, 'cycle-time-report.md');
            if (fs.existsSync(ctReport)) {
              const content = fs.readFileSync(ctReport, 'utf8');
              body += '### Cycle Time\n' + content.substring(0, 500) + '\n\n';
            }
            
            body += '---\n*Generated by DORA Metrics Automation*\n';
            
            try {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Report] DORA Metrics - Week ${new Date().toISOString().substring(0, 10)}`,
                body: body,
                labels: ['report', 'metrics', 'dora']
              });
              
              console.log(`✓ Report issue created: #${issue.data.number}`);
            } catch (error) {
              console.error('Error creating report issue:', error);
            }

      - name: Upload analysis results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: metrics-analysis
          path: .github/metrics/
          retention-days: 30
